<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Bo Travel Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="logo">日本</div>
      <nav class="nav-links">
        <!--<a href="#tokyo">東京</a>
        <a href="#kyoto">京都</a>
        <a href="#osaka">大阪</a>-->
      </nav>
    </header>

    <main class="main">
      <section class="photo-section">
        <div class="photo-frame">
          <img
            id="japan-photo"
            src="https://images.pexels.com/photos/3408353/pexels-photo-3408353.jpeg"
            alt="富士山，山梨／靜岡"
          />
          <div class="photo-overlay">
            <div id="photo-name" class="photo-name">富士山，山梨／靜岡</div>
          </div>
        </div>
        <button
          id="next-photo"
          class="rotate-button"
          type="button"
          aria-label="旋轉照片"
          title="旋轉照片"
        >
          🐱
        </button>
        <div
          id="place-info"
          class="place-info"
          style="display: none; white-space: pre-line;"
        ></div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="social-section">
          <span class="footer-label"><!--追蹤 Bo：--></span>
          <div class="social-links">
            <a
              href="#"
              class="social-icon"
              aria-label="Bo 的 Facebook"
              title="Facebook"
            >
              f
            </a>
            <a
              href="#"
              class="social-icon"
              aria-label="Bo 的 Instagram"
              title="Instagram"
            >
              ig
            </a>
            <a
              href="#"
              class="social-icon"
              aria-label="Bo 的 Threads"
              title="Threads"
            >
              t
            </a>
            <a
              href="#"
              class="social-icon"
              aria-label="Bo 的 YouTube"
              title="YouTube"
            >
              ▶
            </a>
          </div>
        </div>
        <button class="donate-button" type="button">
          為山區 Bo 捐款呀!
        </button>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
